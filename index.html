<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GANATUBY RIFAS</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.banner{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.premio{
font-size:30px;
font-weight:bold;
color:#eab308;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:20px;
}

.numero{
background:#22c55e;
color:white;
padding:15px;
text-align:center;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.numero:hover{
transform:scale(1.05);
}

.boton{
display:block;
width:250px;
margin:20px auto;
padding:15px;
background:#0f172a;
color:white;
text-decoration:none;
text-align:center;
border-radius:10px;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
}
</style>

</head>
<body>

<header>
<h1>🎟️ GANATUBY RIFAS</h1>
<p>La suerte puede ser tuya</p>
</header>

<div class="banner">
<h2 class="premio">🏍️ MOTO NKD 125</h2>
<p>Valor del número: $10.000</p>
<p>Sorteo: 30 de Agosto</p>
</div>

<div class="grid">

<div class="numero">0001</div>
<div class="numero">0002</div>
<div class="numero">0003</div>
<div class="numero">0004</div>
<div class="numero">0005</div>

<div class="numero">0006</div>
<div class="numero">0007</div>
<div class="numero">0008</div>
<div class="numero">0009</div>
<div class="numero">0010</div>

</div>

<a class="boton" href="#">
Comprar Números
</a>

<footer>
© 2025 GANATUBY
</footer>

</body>
</html>
